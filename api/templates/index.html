<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>저평가 가치주 분석 AI 리포트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

    header { background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%); color: white; padding: 2rem 1.5rem; text-align: center; }
    header h1 { font-size: 1.7rem; font-weight: 700; margin-bottom: 0.4rem; }
    header p  { font-size: 0.9rem; opacity: 0.85; }

    .container { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem; }

    .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 1.5rem; }
    .card h2 { font-size: 1rem; color: #4a5568; margin-bottom: 1rem; font-weight: 600; }

    .memo-label { display: block; font-size: 0.85rem; color: #718096; font-weight: 500; margin-bottom: 0.5rem; }
    .memo-input { width: 100%; padding: 0.7rem 0.9rem; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.92rem; color: #2d3748; outline: none; resize: none; font-family: inherit; line-height: 1.5; transition: border-color 0.2s; }
    .memo-input:focus { border-color: #2b6cb0; }
    .memo-hint { font-size: 0.78rem; color: #a0aec0; margin-top: 0.4rem; }

    .btn-primary { width: 100%; padding: 0.85rem; background: linear-gradient(135deg, #2b6cb0, #1a365d); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    #loading { display: none; text-align: center; padding: 2.5rem 1rem; }
    .spinner { width: 44px; height: 44px; border: 4px solid #e2e8f0; border-top-color: #2b6cb0; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #718096; font-size: 0.9rem; }

    #error-box { display: none; background: #fff5f5; border: 1.5px solid #fc8181; border-radius: 10px; padding: 1rem 1.25rem; color: #c53030; font-size: 0.9rem; margin-bottom: 1.5rem; }

    #result-section { display: none; }
    .result-meta { font-size: 0.82rem; color: #a0aec0; margin-bottom: 0.75rem; }

    /* 섹터 분산 */
    .sector-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 0.4rem; margin-bottom: 1.2rem; padding: 0.65rem 0.9rem; background: white; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
    .sector-bar-label { font-size: 0.72rem; font-weight: 700; color: #a0aec0; margin-right: 0.15rem; white-space: nowrap; }
    .sp { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.22rem 0.6rem; border-radius: 999px; font-size: 0.76rem; font-weight: 600; border: 1.5px solid; }
    .sp-1 { background: #f7fafc; color: #718096; border-color: #e2e8f0; }
    .sp-2 { background: #ebf8ff; color: #2b6cb0; border-color: #bee3f8; }
    .sp-3 { background: #e9d8fd; color: #553c9a; border-color: #d6bcfa; }
    .sp-hi { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .sp-count { font-size: 0.82em; opacity: 0.75; }

    /* 과거 리포트 비교 */
    .history-box { background: #fffbeb; border: 1.5px solid #f6e05e; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
    .history-box h3 { font-size: 0.88rem; font-weight: 700; color: #744210; margin-bottom: 0.6rem; }
    .history-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; margin-bottom: 0.3rem; }
    .history-item .chg-pos { color: #22543d; font-weight: 700; }
    .history-item .chg-neg { color: #9b2c2c; font-weight: 700; }
    .history-item .chg-neu { color: #718096; }

    /* 종목 카드 */
    .stock-card { background: white; border-radius: 12px; padding: 1.4rem 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 1.2rem; border-left: 4px solid #2b6cb0; }

    .stock-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .stock-num { background: #2b6cb0; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
    .stock-name { font-size: 1.1rem; font-weight: 700; }
    .stock-code { font-size: 0.82rem; color: #718096; margin-left: 0.25rem; }

    .badge-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .badge { padding: 0.22rem 0.65rem; border-radius: 999px; font-size: 0.76rem; font-weight: 600; }
    .badge-type { background: #faf5ff; color: #6b46c1; }
    .badge-per  { background: #ebf8ff; color: #2b6cb0; }
    .badge-roe  { background: #f0fff4; color: #276749; }
    .badge-streak { font-weight: 700; }
    .streak-2 { background: #ebf8ff; color: #2b6cb0; border: 1.5px solid #bee3f8; }
    .streak-3 { background: #e9d8fd; color: #553c9a; border: 1.5px solid #d6bcfa; }
    .streak-4 { background: #fefcbf; color: #744210; border: 1.5px solid #f6e05e; }
    .streak-hi { background: #fff5f5; color: #9b2c2c; border: 1.5px solid #feb2b2; }
    .badge-risk-low { background: #f0fff4; color: #276749; }
    .badge-risk-mid { background: #fffbeb; color: #744210; }
    .badge-risk-hi  { background: #fff5f5; color: #c53030; }

    /* 즐겨찾기 */
    .fav-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #cbd5e0; line-height: 1; padding: 0.1rem 0.15rem; transition: color 0.15s, transform 0.15s; flex-shrink: 0; }
    .fav-btn:hover { color: #f6ad55; transform: scale(1.2); }
    .fav-btn.fav-on { color: #f6ad55; }
    .stock-card.fav-card { border-left-color: #f6ad55; }
    .fav-empty { text-align: center; color: #a0aec0; padding: 3rem 1rem; font-size: 0.95rem; line-height: 2; }
    #fav-count { font-size: 0.8em; opacity: 0.85; }

    /* 매도·매수 신호 배지 */
    .badge-signal { font-weight: 700; }
    .sig-sell     { background: #fff5f5; color: #c53030; border: 1.5px solid #feb2b2; animation: sig-pulse 1.8s ease-in-out infinite; }
    .sig-hot      { background: #fffaf0; color: #c05621; border: 1.5px solid #fbd38d; }
    .sig-buy      { background: #f0fff4; color: #1a6840; border: 1.5px solid #9ae6b4; animation: sig-pulse-g 1.8s ease-in-out infinite; }
    .sig-oversold { background: #ebf8ff; color: #2b6cb0; border: 1.5px solid #bee3f8; }
    @keyframes sig-pulse   { 0%,100%{box-shadow:0 0 0 0 rgba(197,48,48,.35)} 50%{box-shadow:0 0 0 5px rgba(197,48,48,0)} }
    @keyframes sig-pulse-g { 0%,100%{box-shadow:0 0 0 0 rgba(39,103,73,.3)}  50%{box-shadow:0 0 0 5px rgba(39,103,73,0)} }

    /* 정보 그리드 */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem; }
    .info-item { background: #f7fafc; border-radius: 8px; padding: 0.55rem 0.75rem; border: 1px solid #e2e8f0; }
    .info-item .lbl { font-size: 0.7rem; font-weight: 700; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.2rem; }
    .info-item .val { font-size: 0.88rem; color: #2d3748; font-weight: 500; }

    /* 섹션 텍스트 */
    .section-block { margin-bottom: 0.85rem; }
    .section-lbl { font-size: 0.74rem; font-weight: 700; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .section-body { font-size: 0.9rem; color: #2d3748; line-height: 1.6; }

    .valuation-box { background: #f7fafc; border-radius: 8px; padding: 0.65rem 1rem; font-size: 0.87rem; color: #4a5568; border: 1px solid #e2e8f0; margin-bottom: 0.75rem; }

    /* 가격 박스 */
    .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-top: 0.5rem; }
    .price-box { border-radius: 8px; padding: 0.65rem 1rem; }
    .price-box .plbl { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em; margin-bottom: 0.2rem; }
    .price-box .pval { font-weight: 700; font-size: 0.92rem; }
    .price-box.target   { background: #f0fff4; border: 1px solid #9ae6b4; }
    .price-box.target .plbl { color: #276749; }
    .price-box.target .pval { color: #22543d; }
    .price-box.stoploss { background: #fff5f5; border: 1px solid #feb2b2; }
    .price-box.stoploss .plbl { color: #c53030; }
    .price-box.stoploss .pval { color: #9b2c2c; }

    /* ── 손절·목표 가격 범위 바 ── */
    .price-range-wrap { margin-top: 0.75rem; padding: 0.75rem 1rem; background: #f7fafc; border-radius: 8px; border: 1px solid #e2e8f0; }
    .prb-title { font-size: 0.7rem; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.55rem; }
    .prb-track { position: relative; height: 10px; border-radius: 5px; background: linear-gradient(to right, #fc8181 0%, #f6e05e 40%, #68d391 100%); margin: 0.4rem 0; }
    .prb-dot { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 16px; height: 16px; background: #2b6cb0; border: 2.5px solid white; border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.25); }
    .prb-end-labels { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 0.1rem; }
    .prb-stop-lbl { color: #c53030; font-weight: 700; }
    .prb-target-lbl { color: #276749; font-weight: 700; }
    .prb-dist-row { display: flex; justify-content: space-between; font-size: 0.72rem; margin-top: 0.45rem; }
    .prb-dist-stop { color: #c53030; font-weight: 700; }
    .prb-dist-cur { color: #4a5568; font-size: 0.68rem; text-align: center; }
    .prb-dist-target { color: #276749; font-weight: 700; }
    .prb-guide { margin-top: 0.5rem; padding-top: 0.45rem; border-top: 1px solid #e2e8f0; font-size: 0.7rem; color: #718096; line-height: 1.5; }

    /* 52주 바 */
    .week52-bar-wrap { margin: 0.75rem 0; }
    .week52-labels { display: flex; justify-content: space-between; font-size: 0.72rem; color: #718096; margin-bottom: 0.25rem; }
    .week52-bar { height: 6px; background: #e2e8f0; border-radius: 3px; position: relative; }
    .week52-fill { height: 100%; background: linear-gradient(90deg, #fc8181, #f6e05e, #68d391); border-radius: 3px; }
    .week52-dot  { position: absolute; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; background: #2b6cb0; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 4px rgba(0,0,0,0.2); margin-left: -6px; }
    .week52-pct  { font-size: 0.72rem; color: #718096; text-align: right; margin-top: 0.2rem; }

    .btn-download { display: block; width: 100%; padding: 0.75rem; background: #f7fafc; color: #2b6cb0; border: 1.5px solid #bee3f8; border-radius: 10px; font-size: 0.95rem; font-weight: 600; text-align: center; cursor: pointer; margin-top: 1.5rem; transition: background 0.2s; }
    .btn-download:hover { background: #ebf8ff; }

    .section-header { display: flex; align-items: center; gap: 0.6rem; margin: 1.8rem 0 1rem; }
    .section-header .sh-badge { padding: 0.3rem 0.9rem; border-radius: 999px; font-size: 0.82rem; font-weight: 700; }
    .sh-short { background: #fff3cd; color: #856404; border: 1.5px solid #ffc107; }
    .sh-long  { background: #d1ecf1; color: #0c5460; border: 1.5px solid #17a2b8; }
    .section-header .sh-desc { font-size: 0.8rem; color: #718096; }
    .stock-card.short { border-left-color: #f6ad55; }
    .stock-card.long  { border-left-color: #4299e1; }

    /* ── 종합 매수 점수 뱃지 ── */
    .stock-header { justify-content: space-between; }
    .stock-header-left { display: flex; align-items: center; gap: 0.75rem; }
    .buy-score-badge { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 58px; height: 58px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
    .bs-num { font-size: 1.25rem; font-weight: 800; line-height: 1; }
    .bs-lbl { font-size: 0.58rem; font-weight: 700; margin-top: 0.1rem; letter-spacing: -0.02em; }
    .score-strong-buy { background: linear-gradient(135deg,#276749,#38a169); color: white; }
    .score-buy        { background: linear-gradient(135deg,#2f855a,#68d391); color: white; }
    .score-neutral    { background: linear-gradient(135deg,#d69e2e,#f6e05e); color: #744210; }
    .score-watch      { background: linear-gradient(135deg,#c05621,#ed8936); color: white; }
    .score-avoid      { background: linear-gradient(135deg,#9b2c2c,#e53e3e); color: white; }

    .horizon-bar { display: flex; align-items: center; gap: 0.5rem; background: #f7fafc; border-radius: 8px; padding: 0.55rem 0.85rem; margin-bottom: 0.85rem; border: 1px solid #e2e8f0; font-size: 0.84rem; }
    .horizon-bar .h-period { font-weight: 700; color: #2d3748; }
    .horizon-bar .h-reason { color: #718096; }
    .disclaimer { font-size: 0.78rem; color: #a0aec0; text-align: center; margin-top: 2rem; line-height: 1.6; }

    .market-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tab-btn { flex: 1; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 10px; background: white; font-size: 0.95rem; font-weight: 600; cursor: pointer; color: #718096; transition: all 0.2s; }
    .tab-btn:hover { border-color: #bee3f8; color: #2b6cb0; }
    .tab-btn.active { background: linear-gradient(135deg, #2b6cb0, #1a365d); color: white; border-color: transparent; }

    /* ── 투자 검증 ── */
    #verify-section { display: none; }
    .verify-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; margin-bottom: 1.2rem; }
    .vs-card { background: white; border-radius: 10px; padding: 0.9rem 0.75rem; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.07); }
    .vs-card .vs-num { font-size: 1.5rem; font-weight: 800; display: block; }
    .vs-card .vs-lbl { font-size: 0.72rem; color: #718096; font-weight: 600; margin-top: 0.2rem; }
    .vs-card.total   .vs-num { color: #2b6cb0; }
    .vs-card.active  .vs-num { color: #2b6cb0; }
    .vs-card.success .vs-num { color: #276749; }
    .vs-card.loss    .vs-num { color: #c53030; }
    .vs-card.expire  .vs-num { color: #744210; }

    .verify-filter { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .vf-btn { padding: 0.35rem 0.9rem; border: 1.5px solid #e2e8f0; border-radius: 999px; background: white; font-size: 0.82rem; font-weight: 600; cursor: pointer; color: #718096; transition: all 0.15s; }
    .vf-btn:hover { border-color: #bee3f8; color: #2b6cb0; }
    .vf-btn.active { background: #2b6cb0; color: white; border-color: transparent; }

    /* 날짜 범위 필터 */
    .vdf-wrap { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1rem; padding: 0.65rem 0.9rem; background: #f7fafc; border-radius: 10px; border: 1px solid #e2e8f0; }
    .vdf-label { font-size: 0.75rem; font-weight: 700; color: #a0aec0; white-space: nowrap; }
    .vdf-presets { display: flex; gap: 0.3rem; }
    .vdf-btn { padding: 0.25rem 0.65rem; border: 1.5px solid #e2e8f0; border-radius: 999px; background: white; font-size: 0.76rem; font-weight: 600; cursor: pointer; color: #718096; transition: all 0.15s; }
    .vdf-btn:hover { border-color: #bee3f8; color: #2b6cb0; }
    .vdf-btn.active { background: #edf2f7; color: #2b6cb0; border-color: #90cdf4; font-weight: 700; }
    .vdf-sep { color: #cbd5e0; margin: 0 0.1rem; }
    .vdf-inputs { display: flex; align-items: center; gap: 0.4rem; }
    .vdf-input { padding: 0.25rem 0.45rem; border: 1.5px solid #e2e8f0; border-radius: 7px; font-size: 0.78rem; color: #4a5568; background: white; cursor: pointer; }
    .vdf-input:focus { outline: none; border-color: #90cdf4; }
    .vdf-clear { padding: 0.25rem 0.6rem; border: 1.5px solid #e2e8f0; border-radius: 999px; background: white; font-size: 0.75rem; cursor: pointer; color: #a0aec0; transition: all 0.15s; }
    .vdf-clear:hover { color: #c53030; border-color: #fed7d7; }
    .vdf-count { font-size: 0.76rem; color: #a0aec0; margin-left: auto; white-space: nowrap; }

    .verify-table-wrap { overflow-x: auto; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .verify-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    .verify-table th { background: #f7fafc; padding: 0.7rem 0.75rem; text-align: left; font-size: 0.72rem; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
    .verify-table td { padding: 0.7rem 0.75rem; border-bottom: 1px solid #f0f4f8; vertical-align: middle; white-space: nowrap; }
    .verify-table tr:last-child td { border-bottom: none; }
    .verify-table tr:hover td { background: #f7fafc; }
    .vt-ret.pos { color: #276749; font-weight: 700; }
    .vt-ret.neg { color: #c53030; font-weight: 700; }
    .vt-ret.neu { color: #718096; }
    .status-badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
    .status-진행중   { background: #ebf8ff; color: #2b6cb0; }
    .status-목표달성 { background: #f0fff4; color: #276749; }
    .status-손절     { background: #fff5f5; color: #c53030; }
    .status-만료     { background: #fffbeb; color: #744210; }
    .verify-empty { text-align: center; padding: 3rem 1rem; color: #a0aec0; font-size: 0.9rem; }
    .verify-avg { background: #f0fff4; border: 1.5px solid #9ae6b4; border-radius: 10px; padding: 0.75rem 1.25rem; margin-bottom: 1rem; font-size: 0.85rem; color: #276749; display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .verify-avg span { font-weight: 700; }

    /* ── 포트폴리오 시뮬레이션 ── */
    .sim-card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 1.5rem; }
    .sim-header { display: flex; align-items: baseline; gap: 0.75rem; margin-bottom: 1.25rem; border-bottom: 1.5px solid #e2e8f0; padding-bottom: 0.85rem; }
    .sim-header > span:first-child { font-size: 1rem; font-weight: 700; }
    .sim-subtitle { font-size: 0.78rem; color: #718096; }
    .sim-summary { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
    .sim-stat { background: #f7fafc; border-radius: 10px; padding: 0.9rem 0.5rem; text-align: center; border: 1px solid #e2e8f0; }
    .sim-stat-val { font-size: 1.35rem; font-weight: 800; margin-bottom: 0.25rem; }
    .sim-stat-lbl { font-size: 0.68rem; color: #718096; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
    .sim-stat-val.pos { color: #276749; }
    .sim-stat-val.neg { color: #c53030; }
    .sim-stat-val.neu { color: #718096; }
    .sim-divider { font-size: 0.78rem; font-weight: 700; color: #a0aec0; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .sim-batches { display: flex; flex-direction: column; gap: 0.85rem; }
    .sim-batch { background: #f7fafc; border-radius: 10px; padding: 1rem; border: 1px solid #e2e8f0; }
    .sim-batch-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
    .sim-batch-date { font-weight: 700; font-size: 0.88rem; color: #2d3748; }
    .sim-batch-days { background: #ebf8ff; color: #2b6cb0; border-radius: 999px; padding: 0.15rem 0.55rem; font-size: 0.73rem; font-weight: 700; }
    .sim-batch-count { font-size: 0.76rem; color: #718096; margin-left: auto; }
    .sim-bar-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.4rem; }
    .sim-bar-lbl { width: 75px; font-size: 0.76rem; color: #4a5568; font-weight: 600; flex-shrink: 0; }
    .sim-bar-bg { flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
    .sim-bar-fill { height: 100%; border-radius: 4px; }
    .sim-bar-val { width: 58px; text-align: right; font-size: 0.82rem; font-weight: 700; flex-shrink: 0; }

    .sim-bar-val.neg { color: #c53030; }
    .sim-bar-val.neu { color: #718096; }
    .sim-excess { font-size: 0.78rem; font-weight: 600; margin-top: 0.45rem; padding: 0.28rem 0.65rem; border-radius: 6px; display: inline-block; }
    .sim-excess.pos { background: #f0fff4; color: #276749; }
    .sim-excess.neg { background: #fff5f5; color: #c53030; }
    .sim-excess.neu { background: #f7fafc; color: #718096; }
    .sim-updated { font-size: 0.7rem; color: #a0aec0; margin-top: 1rem; text-align: right; }
    .sim-empty { text-align: center; padding: 2rem 1rem; color: #a0aec0; font-size: 0.88rem; }

    /* ── 기술적 분석 ── */
    .tech-section { margin-bottom: 0.85rem; }
    .rsi-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; color: #718096; margin-bottom: 0.3rem; }
    .rsi-header b { font-size: 0.9rem; color: #2d3748; }
    .rsi-badge { display: inline-block; padding: 0.1rem 0.45rem; border-radius: 999px; font-size: 0.72rem; font-weight: 700; margin-left: 0.25rem; }
    .rsi-과매수 { background: #fff0e0; color: #c05621; }
    .rsi-과매도 { background: #fff5f5; color: #c53030; }
    .rsi-중립   { background: #f0fff4; color: #276749; }
    .rsi-track { position: relative; height: 7px; border-radius: 4px; margin: 0.25rem 0 0.5rem;
      background: linear-gradient(to right, #fc8181 0%,#fc8181 30%,#e2e8f0 30%,#e2e8f0 70%,#f6ad55 70%,#f6ad55 100%); }
    .rsi-dot { position: absolute; top: 50%; width: 13px; height: 13px; background: #2b6cb0;
      border: 2px solid white; border-radius: 50%; transform: translate(-50%,-50%); box-shadow: 0 1px 4px rgba(0,0,0,0.25); }
    .rsi-zone-labels { display: flex; justify-content: space-between; font-size: 0.68rem; color: #a0aec0; margin-bottom: 0.55rem; }
    .tech-badge-row { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .tech-badge { padding: 0.22rem 0.65rem; border-radius: 6px; font-size: 0.76rem; background: #f7fafc; border: 1px solid #e2e8f0; color: #4a5568; }
    .tech-badge.macd-golden { background: #f0fff4; border-color: #9ae6b4; color: #276749; font-weight: 700; }
    .tech-badge.macd-dead   { background: #fff5f5; border-color: #feb2b2; color: #c53030; font-weight: 700; }
    .tech-badge.ma-bull  { background: #ebf8ff; border-color: #bee3f8; color: #2b6cb0; font-weight: 700; }
    .tech-badge.ma-bear  { background: #fff5f5; border-color: #feb2b2; color: #c53030; font-weight: 700; }
    .tech-badge.ma-mixed { background: #fffbeb; border-color: #f6e05e; color: #744210; font-weight: 700; }
    .vol-급증   { background: #fff3e0; border-color: #fbb040; color: #7b3f00; font-weight: 700; }
    .vol-증가   { background: #e8f5e9; border-color: #a5d6a7; color: #1b5e20; font-weight: 700; }
    .vol-보통   { background: #f7fafc; border-color: #e2e8f0; color: #4a5568; }
    .vol-감소   { background: #f7fafc; border-color: #e2e8f0; color: #a0aec0; }
    .vol-급감   { background: #fafafa; border-color: #e2e8f0; color: #cbd5e0; }
    .tech-explain { margin-top: 0.65rem; padding: 0.55rem 0.7rem; background: #f8f9fa; border-radius: 7px; border: 1px solid #e9ecef; display: flex; flex-direction: column; gap: 0.3rem; }
    .te-row { display: flex; gap: 0.45rem; font-size: 0.72rem; line-height: 1.45; align-items: baseline; }
    .te-term { font-weight: 700; color: #4a5568; white-space: nowrap; min-width: 5.5rem; }

    /* ── 종목 상세 모달 ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:1000; overflow-y:auto; padding:2rem 1rem; }
    .modal-overlay.open { display:block; }
    .modal-panel { background:white; border-radius:16px; max-width:740px; margin:0 auto; padding:1.75rem 1.75rem 1rem; position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.25); }
    .modal-close { position:absolute; top:1rem; right:1rem; background:#f7fafc; border:1px solid #e2e8f0; border-radius:50%; width:32px; height:32px; font-size:1rem; cursor:pointer; color:#718096; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
    .modal-close:hover { background:#edf2f7; color:#2d3748; }
    .modal-header-note { font-size:0.75rem; color:#a0aec0; margin-bottom:1rem; }
    /* 검증 테이블 종목명 클릭 */
    .vt-name-cell { cursor:pointer; }
    .vt-name-cell b { transition:color 0.15s; }
    .vt-name-cell:hover b { color:#2b6cb0; text-decoration:underline; }
    .vt-name-cell:hover { background:#f7fafc; }

    /* ── 검증 탭 내 시장 서브탭 ── */
    .verify-market-tabs { display: flex; gap: 0.4rem; margin-bottom: 1.2rem; }
    .vmt-btn { flex: 1; padding: 0.6rem; border: 1.5px solid #e2e8f0; border-radius: 8px; background: white; font-size: 0.88rem; font-weight: 600; cursor: pointer; color: #718096; transition: all 0.15s; }
    .vmt-btn:hover { border-color: #bee3f8; color: #2b6cb0; }
    .vmt-btn.active { background: linear-gradient(135deg, #2b6cb0, #1a365d); color: white; border-color: transparent; }
  </style>
</head>
<body>

<header>
  <h1>📈 저평가 가치주 분석 AI 리포트</h1>
  <p>KOSPI 대형주 중 기업가치 대비 저평가된 우량 가치주 5개를 자동 선정합니다</p>
</header>

<div class="container">

  <div class="market-tabs">
    <button class="tab-btn active" id="tab-kr" onclick="switchMarket('kr')">🇰🇷 국내주 (KOSPI)</button>
    <button class="tab-btn" id="tab-us" onclick="switchMarket('us')">🇺🇸 미국주 (S&P 500)</button>
    <button class="tab-btn" id="tab-verify" onclick="switchMarket('verify')">📊 투자 검증</button>
    <button class="tab-btn" id="tab-fav" onclick="switchMarket('fav')">⭐ 관심종목 <span id="fav-count"></span></button>
  </div>

  <div id="fav-section" style="display:none"></div>

  <div id="verify-section">
    <div class="verify-market-tabs">
      <button class="vmt-btn active" id="vmt-kr" onclick="switchVerifyMarket('kr')">🇰🇷 국내주 (KOSPI)</button>
      <button class="vmt-btn" id="vmt-us" onclick="switchVerifyMarket('us')">🇺🇸 미국주 (S&P 500)</button>
    </div>
    <div id="sim-section"></div>
    <div id="verify-summary-row" class="verify-summary"></div>
    <div id="verify-avg-bar" class="verify-avg" style="display:none"></div>
    <div class="verify-filter">
      <button class="vf-btn active" id="vf-all"    onclick="filterVerify('all')">전체</button>
      <button class="vf-btn" id="vf-진행중"         onclick="filterVerify('진행중')">진행중</button>
      <button class="vf-btn" id="vf-목표달성"       onclick="filterVerify('목표달성')">목표달성</button>
      <button class="vf-btn" id="vf-손절"           onclick="filterVerify('손절')">손절</button>
      <button class="vf-btn" id="vf-만료"           onclick="filterVerify('만료')">만료</button>
    </div>
    <div class="vdf-wrap">
      <span class="vdf-label">기간</span>
      <div class="vdf-presets">
        <button class="vdf-btn active" id="vdf-all" onclick="setDatePreset('')">전체</button>
        <button class="vdf-btn" id="vdf-7"          onclick="setDatePreset(7)">최근 7일</button>
        <button class="vdf-btn" id="vdf-30"         onclick="setDatePreset(30)">최근 30일</button>
        <button class="vdf-btn" id="vdf-90"         onclick="setDatePreset(90)">최근 90일</button>
      </div>
      <span class="vdf-sep">|</span>
      <div class="vdf-inputs">
        <input class="vdf-input" type="date" id="vdf-from" onchange="setDateCustom()" title="시작일">
        <span style="color:#a0aec0;font-size:0.8rem">~</span>
        <input class="vdf-input" type="date" id="vdf-to"   onchange="setDateCustom()" title="종료일">
        <button class="vdf-clear" onclick="clearDateFilter()">초기화</button>
      </div>
      <span class="vdf-count" id="vdf-count"></span>
    </div>
    <div class="verify-table-wrap">
      <table class="verify-table">
        <thead>
          <tr>
            <th>추천일</th>
            <th>종목명</th>
            <th>투자유형</th>
            <th>진입가</th>
            <th>목표가</th>
            <th>손절가</th>
            <th>현재가</th>
            <th>수익률</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody id="verify-tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="memo-card" class="card">
    <h2>분석 메모 <span style="font-weight:400;color:#a0aec0">(선택사항)</span></h2>
    <label class="memo-label">AI에게 원하는 분석 방향을 자유롭게 입력하세요</label>
    <textarea class="memo-input" id="memo" rows="2"
      placeholder="예: 반도체 섹터 위주로 봐줘 / 배당주 중심으로 / 최근 실적 개선 종목 위주"></textarea>
    <p class="memo-hint">비워두면 PER·ROE 기준 저평가 종목을 자동 선정합니다.</p>
  </div>

  <div id="cached-bar" style="display:none; background:#f0fff4; border:1.5px solid #9ae6b4; border-radius:10px; padding:0.75rem 1.25rem; margin-bottom:1rem; font-size:0.85rem; color:#276749; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.5rem;">
    <span id="cached-date-label"></span>
    <span style="color:#a0aec0; font-size:0.78rem;">매일 오후 3:30 자동 업데이트</span>
  </div>

  <button class="btn-primary" id="btn-analyze" onclick="runAnalysis()">🔍 새로 분석하기</button>

  <div id="loading">
    <div class="spinner"></div>
    <p>데이터 수집 및 AI 분석 중...<br/>20~40초 소요됩니다</p>
  </div>

  <div id="error-box"></div>

  <div id="result-section">
    <p class="result-meta" id="result-meta"></p>
    <div id="sector-bar"></div>
    <div id="history-section"></div>
    <div id="short-section"></div>
    <div id="long-section"></div>
    <button class="btn-download" onclick="downloadReport()">⬇️ 리포트 마크다운 저장</button>
  </div>

  <p class="disclaimer">
    본 서비스는 정보 제공 목적이며 투자 추천이 아닙니다.<br/>
    최종 투자 판단은 본인의 책임입니다.
  </p>
</div>

<!-- 종목 상세 모달 -->
<div class="modal-overlay" id="stock-modal" onclick="closeStockModal(event)">
  <div class="modal-panel" id="modal-panel">
    <button class="modal-close" onclick="closeStockModal()">✕</button>
    <p class="modal-header-note">※ 오늘 추천 목록 기준 분석 리포트입니다.</p>
    <div id="modal-card-wrap"></div>
  </div>
</div>

<script>
  let reportMarkdown = '';
  let currentMarket = 'kr';
  let currentVerifyMarket = 'kr';
  let verifyRecords = [];
  let currentVerifyFilter = 'all';
  let verifyDateFrom = '';
  let verifyDateTo   = '';
  let favs     = new Set(JSON.parse(localStorage.getItem('stock-favs') || '[]'));
  let favData  = JSON.parse(localStorage.getItem('stock-fav-data') || '{}');
  let cachedStocks = { kr: [], us: [] };

  const RISK_CLASS = { '하': 'badge-risk-low', '중': 'badge-risk-mid', '상': 'badge-risk-hi' };
  const RISK_LABEL = { '하': '🟢 리스크 낮음', '중': '🟡 리스크 보통', '상': '🔴 리스크 높음' };
  const TREND_ICON = { '개선': '📈', '보합': '➡️', '악화': '📉' };

  function switchMarket(market) {
    currentMarket = market;
    const isVerify = market === 'verify';
    const isFav    = market === 'fav';
    document.getElementById('tab-kr').classList.toggle('active', market === 'kr');
    document.getElementById('tab-us').classList.toggle('active', market === 'us');
    document.getElementById('tab-verify').classList.toggle('active', isVerify);
    document.getElementById('tab-fav').classList.toggle('active', isFav);
    document.getElementById('memo-card').style.display    = (isVerify || isFav) ? 'none' : '';
    document.getElementById('btn-analyze').style.display  = (isVerify || isFav) ? 'none' : '';
    document.getElementById('cached-bar').style.display   = 'none';
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('verify-section').style.display = isVerify ? 'block' : 'none';
    document.getElementById('fav-section').style.display    = isFav    ? 'block' : 'none';
    document.getElementById('short-section').innerHTML   = '';
    document.getElementById('long-section').innerHTML    = '';
    document.getElementById('history-section').innerHTML = '';

    if (isVerify) {
      currentVerifyMarket = 'kr';
      document.getElementById('vmt-kr').classList.add('active');
      document.getElementById('vmt-us').classList.remove('active');
      loadVerifyData();
    } else if (isFav) {
      renderFavSection();
    } else {
      const placeholders = {
        kr: '예: 반도체 섹터 위주로 봐줘 / 배당주 중심으로 / 최근 실적 개선 종목 위주',
        us: '예: 기술주 위주로 / 배당 성장주 위주 / AI 관련주 위주로'
      };
      document.getElementById('memo').placeholder = placeholders[market];
      loadCachedData();
    }
  }

  function switchVerifyMarket(market) {
    currentVerifyMarket = market;
    document.getElementById('vmt-kr').classList.toggle('active', market === 'kr');
    document.getElementById('vmt-us').classList.toggle('active', market === 'us');
    // 필터 초기화
    document.querySelectorAll('.vf-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('vf-all').classList.add('active');
    loadVerifyData();
  }

  async function loadVerifyData() {
    const endpoint = currentVerifyMarket === 'us' ? '/api/verify-us' : '/api/verify-kr';
    try {
      const res = await fetch(endpoint);
      const data = await res.json();
      verifyRecords = (data.records || []).slice().reverse(); // 최신순
      const benchLabel = currentVerifyMarket === 'us' ? 'S&P 500' : 'KOSPI';
      renderSimulation(verifyRecords, data.benchmark || {}, benchLabel);
      currentVerifyFilter = 'all';
      verifyDateFrom = ''; verifyDateTo = '';
      document.querySelectorAll('.vf-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('vf-all').classList.add('active');
      document.querySelectorAll('.vdf-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('vdf-all').classList.add('active');
      renderVerify();
    } catch(e) {
      document.getElementById('verify-tbody').innerHTML =
        '<tr><td colspan="9" class="verify-empty">데이터를 불러올 수 없습니다.</td></tr>';
    }
  }

  function renderSimulation(records, benchmark, benchLabel = 'KOSPI') {
    const sec = document.getElementById('sim-section');
    if (!records.length) {
      sec.innerHTML = '<div class="sim-card"><div class="sim-empty">GitHub Actions 실행 후 추적 데이터가 쌓이면 시뮬레이션이 표시됩니다.</div></div>';
      return;
    }

    const kospiNow = benchmark.current || 0;

    // rec_date별 배치 그룹화 (최신순)
    const batchMap = {};
    for (const r of records) {
      (batchMap[r.rec_date] = batchMap[r.rec_date] || []).push(r);
    }
    const batchDates = Object.keys(batchMap).sort().reverse();

    const batches = batchDates.map(dt => {
      const recs = batchMap[dt];
      const returns = recs.map(r => r.exit_return_pct ?? r.current_return_pct ?? 0);
      const portReturn = returns.reduce((a, b) => a + b, 0) / returns.length;
      const kospiEntry = benchmark[dt] || 0;
      const kospiReturn = (kospiEntry && kospiNow)
        ? (kospiNow - kospiEntry) / kospiEntry * 100
        : null;
      const daysElapsed = Math.floor((Date.now() - new Date(dt)) / 86400000);
      return { dt, recs, portReturn, kospiReturn, daysElapsed };
    });

    // 전체 요약 계산
    const avgPort  = batches.reduce((s, b) => s + b.portReturn, 0) / batches.length;
    const bwk      = batches.filter(b => b.kospiReturn !== null);
    const avgKospi = bwk.length ? bwk.reduce((s, b) => s + b.kospiReturn, 0) / bwk.length : null;
    const avgExcess = avgKospi !== null ? avgPort - avgKospi : null;

    function fmt(n) {
      if (n === null || n === undefined) return 'N/A';
      return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    }
    function cls(n) {
      if (n === null || n === undefined) return 'neu';
      return n > 0 ? 'pos' : n < 0 ? 'neg' : 'neu';
    }
    function barW(pct) {
      // ±20% = 100% bar width
      return Math.min(Math.abs(pct || 0) / 20 * 100, 100).toFixed(1);
    }
    function barColor(pct) {
      return pct >= 0 ? '#48bb78' : '#fc8181';
    }

    const summaryHtml = `
      <div class="sim-summary">
        <div class="sim-stat">
          <div class="sim-stat-val ${cls(avgPort)}">${fmt(avgPort)}</div>
          <div class="sim-stat-lbl">포트폴리오 평균</div>
        </div>
        <div class="sim-stat">
          <div class="sim-stat-val ${cls(avgKospi)}">${fmt(avgKospi)}</div>
          <div class="sim-stat-lbl">${benchLabel} 평균</div>
        </div>
        <div class="sim-stat">
          <div class="sim-stat-val ${cls(avgExcess)}">${fmt(avgExcess)}</div>
          <div class="sim-stat-lbl">초과수익 (알파)</div>
        </div>
      </div>`;

    const batchCards = batches.map(b => {
      const excess = b.kospiReturn !== null ? b.portReturn - b.kospiReturn : null;
      const excessTxt = excess !== null
        ? `${excess >= 0 ? '▲' : '▼'} 초과수익 ${fmt(excess)} — ${excess >= 0 ? '시장 대비 유리' : '시장 대비 불리'}`
        : '';
      return `
        <div class="sim-batch">
          <div class="sim-batch-header">
            <span class="sim-batch-date">${b.dt}</span>
            <span class="sim-batch-days">D+${b.daysElapsed}</span>
            <span class="sim-batch-count">${b.recs.length}종목 · 균등 비중</span>
          </div>
          <div class="sim-bar-row">
            <span class="sim-bar-lbl">포트폴리오</span>
            <div class="sim-bar-bg"><div class="sim-bar-fill" style="width:${barW(b.portReturn)}%;background:${barColor(b.portReturn)}"></div></div>
            <span class="sim-bar-val ${cls(b.portReturn)}">${fmt(b.portReturn)}</span>
          </div>
          ${b.kospiReturn !== null ? `
          <div class="sim-bar-row">
            <span class="sim-bar-lbl">${benchLabel}</span>
            <div class="sim-bar-bg"><div class="sim-bar-fill" style="width:${barW(b.kospiReturn)}%;background:${barColor(b.kospiReturn)}"></div></div>
            <span class="sim-bar-val ${cls(b.kospiReturn)}">${fmt(b.kospiReturn)}</span>
          </div>` : ''}
          ${excess !== null ? `<div class="sim-excess ${cls(excess)}">${excessTxt}</div>` : ''}
        </div>`;
    }).join('');

    sec.innerHTML = `
      <div class="sim-card">
        <div class="sim-header">
          <span>📈 포트폴리오 시뮬레이션</span>
          <span class="sim-subtitle">추천 종목 균등 비중 가상 매수 vs KOSPI 비교</span>
        </div>
        ${summaryHtml}
        <div class="sim-divider">배치별 성과 (${batches.length}회 추천)</div>
        <div class="sim-batches">${batchCards}</div>
        ${benchmark.updated ? `<div class="sim-updated">KOSPI 마지막 갱신: ${benchmark.updated}</div>` : ''}
      </div>`;
  }

  function filterVerify(status) {
    currentVerifyFilter = status;
    document.querySelectorAll('.vf-btn').forEach(b => b.classList.remove('active'));
    const btnId = status === 'all' ? 'vf-all' : 'vf-' + status;
    const btn = document.getElementById(btnId);
    if (btn) btn.classList.add('active');
    renderVerify();
  }

  function setDatePreset(days) {
    document.querySelectorAll('.vdf-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(days ? 'vdf-' + days : 'vdf-all').classList.add('active');
    if (!days) {
      verifyDateFrom = ''; verifyDateTo = '';
      document.getElementById('vdf-from').value = '';
      document.getElementById('vdf-to').value   = '';
    } else {
      const d = new Date(); d.setDate(d.getDate() - days);
      verifyDateFrom = d.toISOString().slice(0, 10);
      verifyDateTo   = '';
      document.getElementById('vdf-from').value = verifyDateFrom;
      document.getElementById('vdf-to').value   = '';
    }
    renderVerify();
  }

  function setDateCustom() {
    verifyDateFrom = document.getElementById('vdf-from').value;
    verifyDateTo   = document.getElementById('vdf-to').value;
    document.querySelectorAll('.vdf-btn').forEach(b => b.classList.remove('active'));
    renderVerify();
  }

  function clearDateFilter() {
    verifyDateFrom = ''; verifyDateTo = '';
    document.getElementById('vdf-from').value = '';
    document.getElementById('vdf-to').value   = '';
    document.querySelectorAll('.vdf-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('vdf-all').classList.add('active');
    renderVerify();
  }

  function renderVerify() {
    // 상태 필터
    let records = currentVerifyFilter === 'all'
      ? [...verifyRecords]
      : verifyRecords.filter(r => r.status === currentVerifyFilter);
    // 날짜 필터
    if (verifyDateFrom) records = records.filter(r => r.rec_date >= verifyDateFrom);
    if (verifyDateTo)   records = records.filter(r => r.rec_date <= verifyDateTo);

    // 필터된 건수 표시
    const countEl = document.getElementById('vdf-count');
    if (countEl) countEl.textContent = `${records.length}건`;

    // 요약 카드
    const total   = verifyRecords.length;
    const active  = verifyRecords.filter(r => r.status === '진행중').length;
    const success = verifyRecords.filter(r => r.status === '목표달성').length;
    const loss    = verifyRecords.filter(r => r.status === '손절').length;
    const expire  = verifyRecords.filter(r => r.status === '만료').length;
    document.getElementById('verify-summary-row').innerHTML = `
      <div class="vs-card total">  <span class="vs-num">${total}</span>  <div class="vs-lbl">총 추천</div></div>
      <div class="vs-card active"> <span class="vs-num">${active}</span> <div class="vs-lbl">진행중</div></div>
      <div class="vs-card success"><span class="vs-num">${success}</span><div class="vs-lbl">목표달성</div></div>
      <div class="vs-card loss">   <span class="vs-num">${loss}</span>   <div class="vs-lbl">손절</div></div>`;

    // 평균 수익률 (종결된 종목)
    const closed = verifyRecords.filter(r => r.exit_return_pct != null);
    const avgBar = document.getElementById('verify-avg-bar');
    if (closed.length > 0) {
      const avg = (closed.reduce((s, r) => s + r.exit_return_pct, 0) / closed.length).toFixed(2);
      const winRate = Math.round(closed.filter(r => r.exit_return_pct > 0).length / closed.length * 100);
      const sign = avg >= 0 ? '+' : '';
      avgBar.style.display = 'flex';
      avgBar.innerHTML = `평균 수익률 <span>${sign}${avg}%</span> &nbsp;·&nbsp; 승률 <span>${winRate}%</span> &nbsp;·&nbsp; 종결 ${closed.length}개`;
    } else {
      avgBar.style.display = 'none';
    }

    // 테이블
    const tbody = document.getElementById('verify-tbody');
    if (records.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="verify-empty">해당 항목이 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = records.map(r => {
      const retPct = r.current_return_pct ?? 0;
      const sign   = retPct >= 0 ? '+' : '';
      const retCls = retPct > 0 ? 'pos' : retPct < 0 ? 'neg' : 'neu';
      const isUS = currentVerifyMarket === 'us';
      const fmtPrice = (p) => !p ? '-' : isUS
        ? '$' + Number(p).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})
        : Number(p).toLocaleString() + '원';
      const curPrice   = fmtPrice(r.current_price);
      const entryPrice = fmtPrice(r.entry_price);
      const tgt  = r.target_str  || '-';
      const sl   = r.stop_loss_str ? r.stop_loss_str.split('(')[0].trim() : '-';
      const horiz = r.investment_horizon || r.hold_period || '-';
      return `<tr>
        <td>${r.rec_date}</td>
        <td class="vt-name-cell" onclick="openVerifyModal('${r.rec_date}', '${r.code}')"><b>${r.name}</b><br><span style="font-size:0.75rem;color:#a0aec0">${r.code}</span></td>
        <td>${horiz}</td>
        <td>${entryPrice}</td>
        <td style="color:#276749">${tgt}</td>
        <td style="color:#c53030">${sl}</td>
        <td>${curPrice}</td>
        <td class="vt-ret ${retCls}">${sign}${retPct.toFixed(2)}%</td>
        <td><span class="status-badge status-${r.status}">${r.status}</span></td>
      </tr>`;
    }).join('');
  }

  async function loadCachedData() {
    const endpoint = currentMarket === 'us' ? '/api/cached-us' : '/api/cached-kr';
    try {
      const res = await fetch(endpoint);
      if (!res.ok) return;
      const data = await res.json();
      if (!data.success || !data.stocks) return;

      reportMarkdown = data.report;
      cachedStocks[currentMarket] = data.stocks;
      // 즐겨찾기 데이터 최신 정보로 갱신
      data.stocks.forEach(s => {
        const key = `${currentMarket}:${s.code}`;
        if (favs.has(key)) { favData[key] = s; }
      });
      localStorage.setItem('stock-fav-data', JSON.stringify(favData));
      renderHistory(data.overlaps, data.prev_date);
      renderSectorBar(data.stocks);
      renderStocks(data.stocks, '단기', 'short-section', currentMarket);
      renderStocks(data.stocks, '중장기', 'long-section', currentMarket);

      const marketLabel = currentMarket === 'us' ? '🇺🇸 S&P 500' : '🇰🇷 KOSPI';
      document.getElementById('result-meta').textContent =
        `${marketLabel} · 분석일: ${data.date}`;
      document.getElementById('result-section').style.display = 'block';

      const bar = document.getElementById('cached-bar');
      document.getElementById('cached-date-label').textContent =
        `✅ 마지막 자동 분석: ${data.date}`;
      bar.style.display = 'flex';
    } catch (e) {
      // 캐시 없으면 조용히 무시 (버튼으로 직접 분석 가능)
    }
  }

  async function runAnalysis() {
    const memo = document.getElementById('memo').value.trim();
    document.getElementById('btn-analyze').disabled = true;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('error-box').style.display = 'none';
    document.getElementById('result-section').style.display = 'none';

    try {
      const endpoint = currentMarket === 'us' ? '/api/analyze-us' : '/api/analyze';
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ memo })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || '알 수 없는 오류');

      reportMarkdown = data.report;
      cachedStocks[currentMarket] = data.stocks;
      // 즐겨찾기 데이터 최신 정보로 갱신
      data.stocks.forEach(s => {
        const key = `${currentMarket}:${s.code}`;
        if (favs.has(key)) { favData[key] = s; }
      });
      localStorage.setItem('stock-fav-data', JSON.stringify(favData));
      renderHistory(data.overlaps, data.prev_date);
      renderSectorBar(data.stocks);
      renderStocks(data.stocks, '단기', 'short-section', currentMarket);
      renderStocks(data.stocks, '중장기', 'long-section', currentMarket);

      const marketLabel = currentMarket === 'us' ? '🇺🇸 S&P 500' : '🇰🇷 KOSPI';
      const now = new Date().toLocaleDateString('ko-KR');
      document.getElementById('result-meta').textContent =
        `${marketLabel} · 생성일: ${now}${memo ? ' · 메모: ' + memo : ''}`;
      document.getElementById('result-section').style.display = 'block';

    } catch (err) {
      const box = document.getElementById('error-box');
      box.textContent = '❌ 오류: ' + err.message;
      box.style.display = 'block';
    } finally {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('btn-analyze').disabled = false;
    }
  }

  function renderHistory(overlaps, prevDate) {
    const sec = document.getElementById('history-section');
    if (!overlaps || overlaps.length === 0) { sec.innerHTML = ''; return; }

    let items = overlaps.map(o => {
      const pct = o.change_pct;
      let cls = 'chg-neu', icon = '➡️';
      if (pct !== 'N/A') {
        const n = parseFloat(pct);
        if (n > 0) { cls = 'chg-pos'; icon = '▲'; }
        else if (n < 0) { cls = 'chg-neg'; icon = '▼'; }
      }
      return `<div class="history-item">
        <span>📌 ${o.name}</span>
        <span class="${cls}">${icon} ${pct}</span>
        <span style="color:#a0aec0;font-size:0.78rem">(${prevDate} 추천 대비)</span>
      </div>`;
    }).join('');

    sec.innerHTML = `<div class="history-box">
      <h3>📊 지난 리포트와 겹치는 종목 (${prevDate})</h3>
      ${items}
    </div>`;
  }

  function renderStocks(stocks, horizon, containerId, market) {
    const container = document.getElementById(containerId);
    const filtered = horizon === '모두' ? stocks : stocks.filter(s => (s.investment_horizon || '중장기') === horizon);

    if (filtered.length === 0) { container.innerHTML = ''; return; }

    const isShort = horizon === '단기';
    container.innerHTML = horizon === '모두' ? '' : `
      <div class="section-header">
        <span class="sh-badge ${isShort ? 'sh-short' : 'sh-long'}">
          ${isShort ? '⚡ 단기 투자' : '📦 중장기 투자'}
        </span>
        <span class="sh-desc">${isShort ? '1~3개월 내 수익 실현 목표' : '6개월 이상 보유, 펀더멘털 기반'}</span>
      </div>`;

    filtered.forEach((s, i) => {
      const per  = s.per  && s.per  !== 'N/A' ? `PER ${s.per}`  : '';
      const roe  = s.roe  && s.roe  !== 'N/A' ? `ROE ${s.roe}%` : '';

                     : scoreVal >= 60 ? 'score-buy'

                     : scoreVal >= 25 ? 'score-watch'
                     : 'score-avoid';

      // 52주 바 위치 계산

        const cur  = s.current_price_raw;

          const pct = Math.min(100, Math.max(0, Math.round((cur - low) / (high - low) * 100)));

            <div class="week52-bar-wrap">
              <div class="week52-labels">

            </div>`;
        }
      } catch(e) {}

      const favKey = `${market}:${s.code}`;
      const isFaved = favs.has(favKey);
      container.innerHTML += `
        <div class="stock-card ${isShort ? 'short' : 'long'}${isFaved ? ' fav-card' : ''}">
          <div class="stock-header">
            <div class="stock-header-left">
              <div class="stock-num">${i + 1}</div>
              <div>

              </div>

            <div style="display:flex;align-items:center;gap:0.35rem">

              if (rsi >= 70)             return `<span class="badge badge-signal sig-hot">⚠️ 과열 구간</span>`;
              if (rsi <= 30 && isGolden) return `<span class="badge badge-signal sig-buy">⚡ 강한 매수 신호</span>`;
              if (rsi <= 30)             return `<span class="badge badge-signal sig-oversold">📉 과매도 반등 주목</span>`;

            const maCls = maSig === '정배열' ? 'ma-bull' : maSig === '역배열' ? 'ma-bear' : 'ma-mixed';
            const macdCls = (s.macd_signal || '').includes('골든') ? 'macd-golden' : 'macd-dead';
            const ma20Str = s.ma20 ? `MA20 ${s.ma20}원` : '';

            // 거래량

            const rsiDesc = rsi <= 30 ? '30 이하 — 지나치게 많이 팔린 상태. 기술적 반등 가능성이 있지만 추세 확인 필요'

                           : `${rsi} — 정상 범위(30~70). 과열·침체 신호 없음`;
            explains.push(['RSI(14)', rsiDesc]);
            // MA
            if (maSig === '정배열')    explains.push(['이동평균 정배열', '주가 > MA20 > MA60 순서. 단기·중기 추세가 모두 상승 방향으로 정렬된 강세 신호']);
            else if (maSig === '역배열') explains.push(['이동평균 역배열', '주가 < MA20 < MA60 순서. 단기·중기 추세가 모두 하락 방향. 신규 매수 시 주의']);
            else if (maSig === '혼조')   explains.push(['이동평균 혼조', 'MA20·MA60과 주가 관계가 일정하지 않음. 방향성이 불분명한 구간']);
            else if (maSig)              explains.push(['이동평균', maSig === '단기상승' ? '주가가 MA20 위에 위치. 단기 상승세 (MA60 데이터 부족)' : '주가가 MA20 아래. 단기 하락 압력']);
            // MACD
            if ((s.macd_signal || '').includes('골든'))
              explains.push(['MACD 골든크로스', 'MACD선이 시그널선을 위로 돌파. 단기 상승 모멘텀 발생 신호 — 매수 관심 구간']);
            else if ((s.macd_signal || '').includes('데드'))
              explains.push(['MACD 데드크로스', 'MACD선이 시그널선을 아래로 돌파. 단기 하락 압력 증가 신호 — 신규 매수 신중']);
            // MA 가격선
            if (s.ma20) explains.push(['MA20', `최근 20거래일 종가 평균(${s.ma20}). 단기 지지·저항선으로 활용`]);
            if (s.ma60 && s.ma60 !== 'N/A') explains.push(['MA60', `최근 60거래일 종가 평균(${s.ma60}). 중기 추세 기준선`]);
            // 거래량
            if (volRatio > 0) {
              const volDescMap = {
                '급증': `평균 대비 ${volRatio}배 — 강한 수급 집중. 세력 유입 또는 뉴스 반응 가능성`,
                '증가': `평균 대비 ${volRatio}배 — 거래 활발. 방향 확인 시 모멘텀 신호`,
                '보통': `평균 대비 ${volRatio}배 — 정상 범위. 특이 신호 없음`,
                '감소': `평균 대비 ${volRatio}배 — 거래 부진. 방향성 약화 가능`,
                '급감': `평균 대비 ${volRatio}배 — 극히 낮은 거래. 관심 이탈 또는 휴장 근처`,
              };
              explains.push(['거래량(20일比)', volDescMap[volSig] || `평균 대비 ${volRatio}배`]);
            }

            const explainHtml = explains.map(([term, desc]) =>
              `<div class="te-row"><span class="te-term">${term}</span><span class="te-desc">${desc}</span></div>`
            ).join('');

            return `<div class="tech-section">
              <div class="section-lbl">기술적 분석</div>
              <div class="rsi-header">
                <span style="color:#c53030">과매도 ≤30</span>
                <span>RSI(14) <b>${s.rsi}</b><span class="rsi-badge ${rsiCls}">${s.rsi_signal}</span></span>
                <span style="color:#c05621">과매수 ≥70</span>
              </div>
              <div class="rsi-track"><div class="rsi-dot" style="left:${Math.min(100,Math.max(0,rsi))}%"></div></div>
              <div class="tech-badge-row">
                ${maSig ? `<span class="tech-badge ${maCls}">${maSig === '정배열' ? '📈' : maSig === '역배열' ? '📉' : '➡️'} 이동평균 ${maSig}</span>` : ''}
                ${s.macd_signal ? `<span class="tech-badge ${macdCls}">MACD ${s.macd_signal}</span>` : ''}
                ${ma20Str ? `<span class="tech-badge">${ma20Str}</span>` : ''}
                ${ma60Str ? `<span class="tech-badge">${ma60Str}</span>` : ''}
                ${volLabel ? `<span class="tech-badge ${volCls}">${volLabel}</span>` : ''}
              </div>
              <div class="tech-explain">${explainHtml}</div>
            </div>`;
          })() : ''}

          <div class="section-block">
            <div class="section-lbl">선정 이유</div>
            <div class="section-body">${s.reason}</div>
          </div>
          <div class="section-block">
            <div class="section-lbl">관련 뉴스 / 동향</div>
            <div class="section-body">${s.news_summary}</div>
          </div>
          ${s.risk_reason ? `<div class="section-block">
            <div class="section-lbl">주요 리스크</div>
            <div class="section-body">⚠️ ${s.risk_reason}</div>
          </div>` : ''}

          ${s.trend_summary ? `<div class="section-block">
            <div class="section-lbl">3년 재무 트렌드 (DART)</div>
            <div class="section-body">📊 ${s.trend_summary}</div>
          </div>` : ''}

          <div class="valuation-box">💡 ${s.valuation}</div>

          <div class="price-grid">
            <div class="price-box target">
              <div class="plbl">🎯 12개월 목표주가</div>
              <div class="pval">${s.future_target || '-'}</div>
              <div style="font-size:0.78rem;color:#276749;margin-top:0.2rem;font-weight:600">${s.upside_pct ? '상승여력 ' + s.upside_pct : ''}</div>
              ${s.current_price_raw ? `<div style="font-size:0.76rem;color:#718096;margin-top:0.3rem">현재가 ${market === 'us' ? '$' + Number(s.current_price_raw).toFixed(2) : Number(s.current_price_raw).toLocaleString() + '원'}</div>` : ''}
            </div>
            <div class="price-box stoploss">
              <div class="plbl">🛑 손절 기준가</div>
              <div class="pval">${s.stop_loss || '-'}</div>
            </div>
          </div>
          ${(() => {
            const cur = s.current_price_raw || 0;
            const parseP = str => { if (!str) return 0; const m = str.replace(/,/g,'').match(/[\d]+\.?\d*/); return m ? parseFloat(m[0]) : 0; };
            const targetP = parseP(s.future_target);
            const stopP   = parseP(s.stop_loss);
            if (!cur || !targetP || !stopP || targetP <= stopP) return '';
            const range = targetP - stopP;
            const pos   = Math.min(98, Math.max(2, Math.round((cur - stopP) / range * 100)));
            const toStop   = ((cur - stopP) / cur * 100).toFixed(1);
            const toTarget = ((targetP - cur) / cur * 100).toFixed(1);
            const isFmt = market === 'us';
            const fmt = p => isFmt ? '$' + p.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}) : p.toLocaleString() + '원';
            return `
            <div class="price-range-wrap">
              <div class="prb-title">현재가 위치</div>
              <div class="prb-end-labels">
                <span class="prb-stop-lbl">🛑 손절 ${fmt(stopP)}</span>
                <span class="prb-target-lbl">🎯 목표 ${fmt(targetP)}</span>
              </div>
              <div class="prb-track">
                <div class="prb-dot" style="left:${pos}%"></div>
              </div>
              <div class="prb-dist-row">
                <span class="prb-dist-stop">손절까지 -${toStop}%</span>
                <span class="prb-dist-cur">● 현재가</span>
                <span class="prb-dist-target">목표까지 +${toTarget}%</span>
              </div>
              <div class="prb-guide">
                ⚠️ <b>손절 기준가(${fmt(stopP)}) 이하로 내려가면 추가 손실을 막기 위해 매도를 고려하세요.</b><br>
                이 가격은 핵심 지지선 기준으로 AI가 산정한 수치로, 실제 투자 결정은 본인 판단에 따라 이루어져야 합니다.
              </div>
            </div>`;
          })()}
        </div>`;
    });
  }

  window.addEventListener('load', () => {
    loadCachedData();
    updateFavTab();
    // 즐겨찾기 탭을 위해 반대 시장 데이터도 백그라운드 로드
    const otherMarket = currentMarket === 'kr' ? 'us' : 'kr';
    fetch(`/api/cached-${otherMarket}`)
      .then(r => r.json())
      .then(data => {
        if (data.success && data.stocks) {
          cachedStocks[otherMarket] = data.stocks;
          // favData 최신 데이터로 갱신
          data.stocks.forEach(s => {
            const key = `${otherMarket}:${s.code}`;
            if (favs.has(key)) {
              favData[key] = s;
            }
          });
          localStorage.setItem('stock-fav-data', JSON.stringify(favData));
        }
      }).catch(() => {});
  });

  // ── 즐겨찾기 ──────────────────────────────────────────────────
  function updateFavTab() {
    const el = document.getElementById('fav-count');
    el.textContent = favs.size > 0 ? `(${favs.size})` : '';
  }

  function toggleFav(key) {
    const [mkt, code] = key.split(':');
    if (favs.has(key)) {
      favs.delete(key);
      delete favData[key];
    } else {
      favs.add(key);
      // 현재 카드 데이터를 localStorage에 저장 (새로고침 후에도 표시)
      const stock = (cachedStocks[mkt] || []).find(s => s.code === code);
      if (stock) favData[key] = stock;
    }
    localStorage.setItem('stock-favs', JSON.stringify([...favs]));
    localStorage.setItem('stock-fav-data', JSON.stringify(favData));
    updateFavTab();
    document.querySelectorAll(`[data-fav-key="${key}"]`).forEach(btn => {
      const on = favs.has(key);
      btn.textContent = on ? '★' : '☆';
      btn.classList.toggle('fav-on', on);
      const card = btn.closest('.stock-card');
      if (card) card.classList.toggle('fav-card', on);
    });
    if (currentMarket === 'fav') renderFavSection();
  }

  function renderFavSection() {
    const sec = document.getElementById('fav-section');
    if (favs.size === 0) {
      sec.innerHTML = '<div class="fav-empty">아직 즐겨찾기한 종목이 없습니다.<br/>카드의 ☆ 버튼을 눌러 추가하세요.</div>';
      return;
    }
    // cachedStocks 우선 (최신 데이터), 없으면 저장된 favData 사용
    const resolve = (mkt) => [...favs]
      .filter(k => k.startsWith(mkt + ':'))
      .map(k => {
        const code = k.slice(mkt.length + 1);
        return (cachedStocks[mkt] || []).find(s => s.code === code) || favData[k];
      })
      .filter(Boolean);

    const krFavs = resolve('kr');
    const usFavs = resolve('us');
    if (krFavs.length === 0 && usFavs.length === 0) {
      sec.innerHTML = '<div class="fav-empty">즐겨찾기한 종목 데이터를 불러올 수 없습니다.<br/>국내/미국주 탭에서 ☆ 버튼을 눌러 추가하세요.</div>';
      return;
    }
    sec.innerHTML = `
      ${krFavs.length ? '<div class="section-header"><span>🇰🇷 국내주 관심종목</span></div><div id="fav-kr-cont"></div>' : ''}
      ${usFavs.length ? '<div class="section-header"><span>🇺🇸 미국주 관심종목</span></div><div id="fav-us-cont"></div>' : ''}
    `;
    if (krFavs.length) renderStocks(krFavs, '모두', 'fav-kr-cont', 'kr');
    if (usFavs.length) renderStocks(usFavs, '모두', 'fav-us-cont', 'us');
  }

  // ── 종목 상세 모달 ─────────────────────────────────────────────
  function openVerifyModal(recDate, code) {
    // verifyRecords에서 해당 기록 찾기
    const rec = verifyRecords.find(r => r.rec_date === recDate && r.code === code);
    if (rec && rec.snapshot) {
      // 추천 당시 스냅샷이 있으면 바로 표시
      const overlay = document.getElementById('stock-modal');
      const wrap    = document.getElementById('modal-card-wrap');
      const note    = overlay.querySelector('.modal-header-note');
      note.textContent = `※ ${recDate} 추천 당시의 분석 데이터입니다.`;
      wrap.innerHTML = '';
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      renderStocks([rec.snapshot], '모두', 'modal-card-wrap', currentVerifyMarket);
    } else {
      // 스냅샷 없는 구 기록 → 오늘 캐시에서 fallback
      const note = document.querySelector('.modal-header-note');
      if (note) note.textContent = '※ 오늘 추천 목록 기준 분석 리포트입니다.';
      openStockModal(code, currentVerifyMarket);
    }
  }

  async function openStockModal(code, market) {
    const overlay = document.getElementById('stock-modal');
    const wrap    = document.getElementById('modal-card-wrap');
    wrap.innerHTML = '<div style="text-align:center;padding:2.5rem;color:#a0aec0">분석 데이터 불러오는 중...</div>';
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';

    // cachedStocks에 있으면 바로 사용
    let stock = (cachedStocks[market] || []).find(s => s.code === code);

    // 없으면 API에서 fetch
    if (!stock) {
      try {
        const endpoint = market === 'us' ? '/api/cached-us' : '/api/cached-kr';
        const res  = await fetch(endpoint);
        const data = await res.json();
        if (data.success && data.stocks) {
          cachedStocks[market] = data.stocks;
          stock = data.stocks.find(s => s.code === code);
        }
      } catch(e) {}
    }

    wrap.innerHTML = '';
    if (!stock) {
      wrap.innerHTML = `<div style="text-align:center;padding:2.5rem;color:#a0aec0;line-height:2">
        오늘 추천 목록에 없는 종목입니다.<br/>
        과거 추천 기록이지만 현재 분석 데이터가 없어 카드를 표시할 수 없습니다.
      </div>`;
      return;
    }
    renderStocks([stock], '모두', 'modal-card-wrap', market);
  }

  function closeStockModal(e) {
    if (e && e.target !== document.getElementById('stock-modal')) return;
    document.getElementById('stock-modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ESC 키로 모달 닫기
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeStockModal();
  });

  // ── 섹터 분산 바 ──────────────────────────────────────────────
  function renderSectorBar(stocks) {
    const el = document.getElementById('sector-bar');
    if (!stocks || !stocks.length) { el.innerHTML = ''; return; }

    const count = {};
    stocks.forEach(s => {
      const key = (s.sector || s.stock_type || '기타').trim();
      count[key] = (count[key] || 0) + 1;
    });

    const sorted = Object.entries(count).sort((a, b) => b[1] - a[1]);
    const pills = sorted.map(([name, n]) => {
      const cls = n >= 4 ? 'sp-hi' : n === 3 ? 'sp-3' : n === 2 ? 'sp-2' : 'sp-1';
      return `<span class="sp ${cls}">${name}<span class="sp-count">${n}</span></span>`;
    }).join('');

    el.innerHTML = `<span class="sector-bar-label">섹터 분산</span>${pills}`;
  }

  function downloadReport() {
    if (!reportMarkdown) return;
    const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
    const blob = new Blob([reportMarkdown], { type: 'text/markdown;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `가치주_리포트_${today}.md`;
    a.click();
  }
</script>
</body>
</html>
